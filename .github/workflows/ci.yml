name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      # Dynamic version (hatch-vcs/setuptools-scm) would drift on every commit
      # after a tag, breaking `uv sync --locked`. Pin a fixed version so the
      # lockfile validation is deterministic regardless of git state. Release
      # builds use the real tag-derived version (see release.yml).
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Ruff
        run: uv run ruff check magpie tests

      - name: Mypy
        run: uv run mypy magpie

      - name: Pytest
        run: uv run pytest -q

      - name: Verify wheel contains force-included data files
        # pyproject.toml force-includes magpie/config.example.json and
        # magpie/news_feeds.json (both loaded at runtime via importlib.resources).
        # This guards against a hatch/packaging change silently dropping them.
        run: |
          uv build --wheel
          uv run python -c "import glob, zipfile; z=zipfile.ZipFile(glob.glob('dist/*.whl')[0]); names=z.namelist(); assert 'magpie/config.example.json' in names, 'config.example.json missing from wheel'; assert 'magpie/news_feeds.json' in names, 'news_feeds.json missing from wheel'; print('wheel contains force-included data files')"
